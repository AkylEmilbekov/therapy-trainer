<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Практика КПТ — тренажёр терапевта</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #FAFAF7;
  --surface: #FFFFFF;
  --surface-2: #F4F3EE;
  --surface-hover: #EFEEE8;
  --border: #E6E4DD;
  --border-strong: #D5D2C8;
  --text: #1A1A19;
  --text-2: #595955;
  --text-3: #8A8881;
  --text-4: #B5B2A8;
  --accent: #2A6FDB;
  --accent-soft: #E8F0FC;
  --warm: #D97757;
  --warm-soft: #FBEFE7;
  --success: #1F8A5B;
  --success-soft: #E3F1EA;
  --warn: #C2410C;
  --warn-soft: #FBEAE0;
  --distortion: #B45309;
  --distortion-bg: #FEF3C7;
  --shadow-sm: 0 1px 2px rgba(20,20,18,0.04);
  --shadow-md: 0 4px 16px rgba(20,20,18,0.06), 0 1px 3px rgba(20,20,18,0.04);
  --radius: 8px;
  --radius-sm: 6px;
  --radius-lg: 12px;
  --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  --sans: "Geist", -apple-system, system-ui, sans-serif;
  --serif: "Newsreader", "Source Serif Pro", Georgia, serif;
}

* { box-sizing: border-box; }

html, body, #root {
  height: 100%;
  margin: 0;
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-feature-settings: "ss01", "cv11";
}

body {
  font-size: 14px;
  line-height: 1.5;
  letter-spacing: -0.005em;
  overflow: hidden;
}

button {
  font: inherit;
  color: inherit;
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 0;
}

button:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

input, textarea {
  font: inherit;
  color: inherit;
}

/* ============ LAYOUT ============ */

.app {
  display: grid;
  grid-template-columns: 256px 1fr 380px;
  height: 100vh;
  min-width: 1240px;
  background: var(--bg);
}

/* enforce desktop min-width only on real desktop */
@media (min-width: 769px) {
  .app { min-width: 1240px; }
}

/* ============ API KEY MODAL ============ */

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(20,20,18,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  backdrop-filter: blur(4px);
}

.modal {
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  padding: 32px;
  width: 440px;
  box-shadow: var(--shadow-md);
}

.modal-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}

.modal-h {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
}

.modal-sub {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.5;
  margin-bottom: 20px;
}

.modal-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-3);
  font-weight: 600;
  margin-bottom: 6px;
}

.modal-input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface-2);
  font-size: 13px;
  font-family: var(--mono);
  outline: none;
  transition: border-color 0.15s;
  margin-bottom: 6px;
}

.modal-input:focus {
  border-color: var(--text-3);
  background: var(--surface);
}

.modal-hint {
  font-size: 11.5px;
  color: var(--text-3);
  margin-bottom: 20px;
  line-height: 1.5;
}

.modal-btn {
  width: 100%;
  padding: 10px;
  background: var(--text);
  color: var(--bg);
  border-radius: var(--radius);
  font-size: 13.5px;
  font-weight: 540;
  letter-spacing: -0.005em;
  transition: background 0.12s;
}

.modal-btn:hover { background: #000; }
.modal-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.modal-note {
  margin-top: 12px;
  font-size: 11.5px;
  color: var(--text-3);
  text-align: center;
}

/* ============ SIDEBAR ============ */

.sidebar {
  background: var(--surface-2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-mark {
  width: 26px;
  height: 26px;
  border-radius: 7px;
  background: var(--text);
  color: var(--bg);
  display: grid;
  place-items: center;
  font-family: var(--serif);
  font-size: 15px;
  font-style: italic;
  font-weight: 500;
  letter-spacing: -0.02em;
}

.brand-title {
  font-size: 13.5px;
  font-weight: 540;
  letter-spacing: -0.01em;
}

.brand-sub {
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 0.02em;
  text-transform: uppercase;
  font-family: var(--mono);
  font-weight: 500;
}

.sidebar-section {
  padding: 16px 12px 8px;
}

.sidebar-label {
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 0 6px 8px;
}

.case-avatar {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  display: grid;
  place-items: center;
  color: white;
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.04em;
  flex: 0 0 28px;
}

.case-meta { flex: 1; min-width: 0; }

.case-name {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: -0.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.case-dx {
  font-size: 11px;
  color: var(--text-3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.case-item.active .case-name { color: var(--text); }
.case-item.active .case-dx { color: var(--text-2); }

.sessions { margin-top: 4px; }

.session-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 8px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 12.5px;
  color: var(--text-2);
  transition: background 0.12s;
  width: 100%;
  text-align: left;
}

.session-row:hover { background: var(--surface-hover); }

.session-row.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow-sm);
  font-weight: 500;
}

.session-num {
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 600;
  color: var(--text-3);
  width: 18px;
  flex: 0 0 18px;
  text-align: center;
}

.session-row.active .session-num { color: var(--text-2); }

.session-title {
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.session-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--border-strong);
  flex: 0 0 6px;
}

.session-row.active .session-dot { background: var(--success); }
.session-row[data-status="done"] .session-dot { background: var(--text-3); }

.sidebar-footer {
  margin-top: auto;
  padding: 12px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: center;
}

.therapist-chip {
  display: flex; gap: 8px; align-items: center;
  padding: 6px 8px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  color: var(--text-2);
  flex: 1;
}

.therapist-chip .case-avatar { background: var(--text); }

/* ============ MAIN ============ */

.main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

.main-header {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--bg);
  flex-shrink: 0;
}

.session-title-big {
  font-size: 14px;
  font-weight: 540;
  letter-spacing: -0.01em;
}

.session-title-big .crumb {
  color: var(--text-3);
  font-weight: 400;
}

.stage-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 9px;
  border-radius: 999px;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 11.5px;
  font-weight: 500;
  letter-spacing: -0.005em;
}

.stage-pill .stage-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
}

.timer {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-3);
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
}

.timer-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--success);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.chat-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 28px 0 16px;
}

.chat-inner {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.msg { display: flex; gap: 12px; align-items: flex-start; }

.msg.system {
  font-size: 12.5px;
  color: var(--text-3);
  font-style: italic;
  background: transparent;
  padding: 4px 14px;
  border-left: 2px solid var(--border-strong);
  margin-left: 4px;
  align-self: stretch;
  max-width: 100%;
}

.msg-avatar {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  display: grid;
  place-items: center;
  color: white;
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.04em;
  flex: 0 0 30px;
  margin-top: 1px;
}

.msg-body { flex: 1; min-width: 0; }

.msg-head {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 3px;
}

.msg-name { font-size: 13px; font-weight: 540; letter-spacing: -0.005em; }
.msg-emotion { font-size: 11px; color: var(--text-3); font-family: var(--mono); }
.msg-time { font-size: 11px; color: var(--text-4); font-family: var(--mono); margin-left: auto; }

.msg-text {
  font-size: 14.5px;
  line-height: 1.55;
  color: var(--text);
  letter-spacing: -0.005em;
  text-wrap: pretty;
}

.msg.therapist .msg-name { color: var(--accent); }

.distortion-mark {
  background: var(--distortion-bg);
  color: var(--distortion);
  padding: 1px 3px;
  border-radius: 3px;
  cursor: help;
  font-weight: 500;
  border-bottom: 1.5px dotted var(--distortion);
  position: relative;
}

.inline-feedback {
  margin-top: 10px;
  padding: 10px 12px;
  border-radius: var(--radius);
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 12.5px;
  color: var(--text-2);
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.inline-feedback-head {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-3);
  font-weight: 600;
}

.score-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 1px 7px;
  border-radius: 999px;
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: -0.01em;
}

.score-pill.good { background: var(--success-soft); color: var(--success); }
.score-pill.ok { background: var(--accent-soft); color: var(--accent); }
.score-pill.warn { background: var(--warn-soft); color: var(--warn); }

.fb-row { display: flex; gap: 8px; align-items: flex-start; }
.fb-row .fb-label {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  white-space: nowrap;
  min-width: 70px;
  padding-top: 1px;
}
.fb-row .fb-val { flex: 1; font-size: 12.5px; color: var(--text); }
.fb-row .fb-val em { font-style: italic; color: var(--text-2); font-family: var(--serif); }

.typing { display: flex; gap: 4px; padding: 6px 0; }
.typing span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-4);
  animation: bouncy 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.15s; }
.typing span:nth-child(3) { animation-delay: 0.3s; }

@keyframes bouncy {
  0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
  30% { opacity: 1; transform: translateY(-3px); }
}

/* ============ COMPOSER ============ */

.composer {
  border-top: 1px solid var(--border);
  background: var(--bg);
  padding: 14px 24px 18px;
  flex-shrink: 0;
}

.composer-inner { max-width: 720px; margin: 0 auto; }

.composer-hint {
  font-size: 11px;
  color: var(--text-3);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.composer-hint-strong { color: var(--text); font-weight: 500; }

.composer-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  transition: border-color 0.15s, box-shadow 0.15s;
  overflow: hidden;
}

.composer-box:focus-within {
  border-color: var(--text-3);
  box-shadow: var(--shadow-md);
}

.composer textarea {
  width: 100%;
  border: none;
  outline: none;
  resize: none;
  padding: 12px 14px 4px;
  background: transparent;
  font-size: 14.5px;
  line-height: 1.55;
  letter-spacing: -0.005em;
  min-height: 44px;
  max-height: 200px;
  font-family: var(--sans);
}

.composer-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px 8px 12px;
}

.composer-techniques { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }

.tech-chip {
  font-size: 11px;
  color: var(--text-2);
  background: var(--surface-2);
  padding: 3px 9px;
  border-radius: 999px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
}
.tech-chip:hover { background: var(--surface-hover); color: var(--text); }
.tech-chip.suggested {
  background: var(--accent-soft);
  color: var(--accent);
  border-color: rgba(42,111,219,0.2);
}

.send-btn {
  background: var(--text);
  color: var(--bg);
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  font-size: 12.5px;
  font-weight: 540;
  letter-spacing: -0.005em;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background 0.12s;
  flex-shrink: 0;
}
.send-btn:hover { background: #000; }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.send-btn kbd {
  font-family: var(--mono);
  font-size: 10px;
  background: rgba(255,255,255,0.15);
  padding: 1px 4px;
  border-radius: 3px;
}

/* ============ RIGHT PANEL ============ */

.right-panel {
  background: var(--surface-2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.right-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  padding: 8px 6px 0;
  gap: 1px;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}
.right-tabs::-webkit-scrollbar { display: none; }

.tab-btn {
  padding: 7px 7px;
  font-size: 11.5px;
  color: var(--text-3);
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
  position: relative;
  font-weight: 500;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--text); background: var(--bg); }
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0; right: 0;
  height: 1px;
  background: var(--bg);
}

.tab-badge {
  font-size: 10px;
  font-family: var(--mono);
  background: var(--text);
  color: var(--bg);
  padding: 0 5px;
  border-radius: 999px;
  min-width: 16px;
  display: inline-grid;
  place-items: center;
  height: 14px;
  font-weight: 600;
}
.tab-btn:not(.active) .tab-badge { background: var(--border-strong); color: var(--text-2); }

.right-content { flex: 1; overflow-y: auto; background: var(--bg); }

.panel-section {
  padding: 18px 18px;
  border-bottom: 1px solid var(--border);
}
.panel-section:last-child { border-bottom: none; }

.panel-h {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 8px;
}

.panel-h2 {
  font-family: var(--serif);
  font-size: 18px;
  letter-spacing: -0.015em;
  font-weight: 500;
  margin-bottom: 4px;
}

.panel-meta { font-size: 12px; color: var(--text-3); }

.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }

.field-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-3);
  margin-bottom: 4px;
  font-weight: 600;
}

.field-val { font-size: 13px; color: var(--text); line-height: 1.5; text-wrap: pretty; }
.field-val ul { margin: 4px 0 0; padding-left: 18px; }
.field-val li { margin-bottom: 2px; }

.goal-list { display: flex; flex-direction: column; gap: 6px; margin: 0; padding: 0; list-style: none; }
.goal-list li {
  font-size: 13px;
  display: flex;
  gap: 8px;
  align-items: flex-start;
  padding: 6px 8px;
  border-radius: var(--radius-sm);
  background: var(--surface-2);
}
.goal-list .goal-num {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-3);
  font-weight: 600;
  padding-top: 2px;
  min-width: 14px;
}

.beck-diagram { display: flex; flex-direction: column; gap: 0; }

.beck-box {
  padding: 10px 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  border-radius: var(--radius);
  position: relative;
  margin-bottom: 6px;
}

.beck-box-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-3);
  font-weight: 600;
  margin-bottom: 3px;
}

.beck-box-content { font-size: 12.5px; color: var(--text); line-height: 1.5; }

.beck-arrow { text-align: center; color: var(--text-4); margin: 2px 0; font-size: 14px; }

.beck-triple {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  margin-bottom: 6px;
}
.beck-triple .beck-box { margin-bottom: 0; }

.distortion-card {
  padding: 10px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 6px;
}
.distortion-card-head { display: flex; align-items: baseline; gap: 6px; margin-bottom: 3px; }
.distortion-name { font-size: 13px; font-weight: 540; }
.distortion-en { font-size: 11px; color: var(--text-3); font-family: var(--mono); }
.distortion-count {
  margin-left: auto;
  font-size: 10.5px;
  background: var(--distortion-bg);
  color: var(--distortion);
  padding: 1px 6px;
  border-radius: 999px;
  font-family: var(--mono);
  font-weight: 600;
}
.distortion-quote {
  font-size: 12px;
  color: var(--text-2);
  font-style: italic;
  border-left: 2px solid var(--distortion-bg);
  padding-left: 8px;
  margin-top: 6px;
  font-family: var(--serif);
}

.tech-group { margin-bottom: 16px; }
.tech-group-h {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-3);
  margin-bottom: 6px;
  font-weight: 600;
}
.tech-card {
  padding: 8px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 4px;
  cursor: pointer;
  transition: all 0.12s;
}
.tech-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-sm); }
.tech-card-head { display: flex; align-items: baseline; gap: 6px; margin-bottom: 2px; }
.tech-name { font-size: 12.5px; font-weight: 540; }
.tech-en { font-size: 10.5px; color: var(--text-3); font-family: var(--mono); }
.tech-desc { font-size: 11.5px; color: var(--text-2); line-height: 1.4; }
.tech-source { margin-top: 4px; font-size: 10.5px; color: var(--text-3); font-family: var(--mono); }

.smer-table { display: flex; flex-direction: column; gap: 8px; }
.smer-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
.smer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; }
.smer-cell-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-3); font-weight: 600; margin-bottom: 2px; }
.smer-cell-val { font-size: 12px; color: var(--text); line-height: 1.4; }
.smer-full { grid-column: 1 / -1; }

.smer-empty {
  padding: 16px 12px;
  text-align: center;
  color: var(--text-3);
  font-size: 12px;
  background: var(--surface);
  border: 1px dashed var(--border-strong);
  border-radius: var(--radius);
}

.smer-empty-action {
  display: inline-block;
  margin-top: 6px;
  color: var(--accent);
  text-decoration: underline;
  text-decoration-style: dotted;
  font-size: 12px;
  cursor: pointer;
}

.scale-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.scale-row:last-child { border-bottom: none; }
.scale-name { width: 80px; flex: 0 0 80px; font-size: 12.5px; font-weight: 540; }
.scale-en { font-size: 11px; color: var(--text-3); font-family: var(--mono); display: block; font-weight: 400; }
.scale-bar { flex: 1; height: 6px; background: var(--surface-2); border-radius: 999px; overflow: hidden; }
.scale-bar-fill { height: 100%; border-radius: 999px; transition: width 0.5s ease; }
.scale-val { font-family: var(--mono); font-size: 12px; font-weight: 600; min-width: 38px; text-align: right; }
.scale-val-meta { font-size: 10.5px; color: var(--text-3); font-family: var(--mono); display: block; text-align: right; font-weight: 400; }

.notes-area {
  width: 100%;
  min-height: 280px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  background: var(--surface);
  font-size: 13px;
  line-height: 1.55;
  resize: vertical;
  font-family: var(--sans);
  outline: none;
}
.notes-area:focus { border-color: var(--text-3); }

.risk-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 540;
  background: var(--success-soft);
  color: var(--success);
}

.right-content::-webkit-scrollbar,
.chat-scroll::-webkit-scrollbar,
.sidebar::-webkit-scrollbar { width: 8px; }
.right-content::-webkit-scrollbar-thumb,
.chat-scroll::-webkit-scrollbar-thumb,
.sidebar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 999px; }
.right-content::-webkit-scrollbar-track,
.chat-scroll::-webkit-scrollbar-track,
.sidebar::-webkit-scrollbar-track { background: transparent; }

.review-card {
  margin: 16px 0;
  padding: 18px 20px;
  background: linear-gradient(180deg, #FEFCF7 0%, var(--surface) 100%);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
}
.review-h { font-family: var(--serif); font-size: 19px; letter-spacing: -0.015em; font-weight: 500; margin: 0 0 4px; }
.review-sub { font-size: 12.5px; color: var(--text-3); margin-bottom: 14px; }
.review-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.review-metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
.review-metric-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-3); font-weight: 600; margin-bottom: 4px; }
.review-metric-val { font-family: var(--mono); font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
.review-section { margin-bottom: 14px; }
.review-section-h { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3); font-weight: 600; margin-bottom: 6px; }
.review-list { margin: 0; padding-left: 18px; }
.review-list li { font-size: 13px; line-height: 1.5; margin-bottom: 4px; }

.empty-state { padding: 28px 16px; text-align: center; color: var(--text-3); font-size: 12.5px; }

.error-toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--warn-soft);
  color: var(--warn);
  border: 1px solid var(--warn);
  padding: 8px 14px;
  border-radius: var(--radius);
  font-size: 12.5px;
  z-index: 100;
  box-shadow: var(--shadow-md);
}

.demo-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  border-radius: 999px;
  background: #FEF3C7;
  color: #92400E;
  border: 1px solid #FCD34D;
  font-size: 11px;
  font-weight: 700;
  font-family: var(--mono);
  letter-spacing: 0.06em;
}

.modal-demo-btn {
  width: 100%;
  padding: 9px;
  background: transparent;
  color: var(--text-2);
  border-radius: var(--radius);
  font-size: 13px;
  border: 1px solid var(--border);
  transition: all 0.12s;
  margin-top: 8px;
}
.modal-demo-btn:hover { border-color: var(--border-strong); color: var(--text); background: var(--surface-2); }

.end-session-btn {
  margin-left: 8px;
  font-size: 12px;
  color: var(--text-2);
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  transition: all 0.12s;
}
.end-session-btn:hover { border-color: var(--border-strong); color: var(--text); }

.key-btn {
  font-size: 11px;
  color: var(--text-3);
  padding: 5px 8px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  transition: all 0.12s;
}
.key-btn:hover { border-color: var(--border-strong); color: var(--text); }

/* ============ MODE SWITCHER ============ */

.mode-switcher {
  display: flex;
  gap: 2px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 2px;
}

.mode-btn {
  font-size: 11.5px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 5px;
  color: var(--text-3);
  transition: all 0.12s;
}
.mode-btn:hover { color: var(--text); }
.mode-btn.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}

/* ============ CONTEXT MENU / CASE ITEMS ============ */

.case-item {
  display: flex;
  align-items: center;
  border-radius: var(--radius-sm);
  transition: background 0.12s;
  position: relative;
}
.case-item:hover { background: var(--surface-hover); }
.case-item.active { background: var(--surface); box-shadow: var(--shadow-sm); }

.case-item-main {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 8px;
  flex: 1;
  min-width: 0;
  cursor: pointer;
}

.case-menu-btn {
  opacity: 0;
  padding: 4px 7px;
  font-size: 14px;
  color: var(--text-3);
  border-radius: var(--radius-sm);
  flex-shrink: 0;
  transition: opacity 0.12s, background 0.12s;
  line-height: 1;
}
.case-item:hover .case-menu-btn { opacity: 1; }
.case-menu-btn.open { opacity: 1; background: var(--surface-hover); }
.case-menu-btn:hover { color: var(--text); }

.context-menu {
  position: absolute;
  right: 4px;
  top: calc(100% + 2px);
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  box-shadow: var(--shadow-md);
  z-index: 50;
  min-width: 140px;
  overflow: hidden;
}
.context-menu-item {
  padding: 8px 12px;
  font-size: 12.5px;
  color: var(--text);
  cursor: pointer;
  transition: background 0.1s;
  display: block;
  width: 100%;
  text-align: left;
}
.context-menu-item:hover { background: var(--surface-2); }
.context-menu-item.danger { color: var(--warn); }

/* ============ NEW CLIENT BUTTON ============ */

.new-client-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 8px;
  border-radius: var(--radius-sm);
  border: 1px dashed var(--border-strong);
  color: var(--text-3);
  font-size: 12.5px;
  width: 100%;
  margin-top: 6px;
  transition: all 0.12s;
}
.new-client-btn:hover { border-color: var(--text-3); color: var(--text); background: var(--surface-hover); }

/* ============ ARCHIVE SECTION ============ */

.archive-section {
  border-top: 1px solid var(--border);
  padding: 8px 12px;
}
.archive-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 4px 0;
  width: 100%;
  text-align: left;
}
.archive-toggle:hover { color: var(--text-2); }
.archive-toggle-arrow { margin-left: auto; font-size: 10px; transition: transform 0.15s; }
.archive-toggle-arrow.open { transform: rotate(90deg); }
.archive-badge {
  background: var(--border-strong);
  color: var(--text-3);
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  padding: 0 5px;
  border-radius: 999px;
  min-width: 16px;
  display: inline-grid;
  place-items: center;
  height: 14px;
}

/* ============ NEW CLIENT MODAL FORM ============ */

.form-field { margin-bottom: 16px; }
.form-field:last-child { margin-bottom: 0; }
.form-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-3);
  font-weight: 600;
  margin-bottom: 6px;
  display: block;
}
.form-select {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface-2);
  font: inherit;
  font-size: 13px;
  color: var(--text);
  outline: none;
  cursor: pointer;
}
.form-select:focus { border-color: var(--text-3); }
.form-range { width: 100%; accent-color: var(--accent); cursor: pointer; }
.form-radio-group { display: flex; gap: 6px; }
.form-radio-btn {
  flex: 1;
  padding: 7px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface-2);
  font-size: 12.5px;
  color: var(--text-2);
  text-align: center;
  cursor: pointer;
  transition: all 0.12s;
}
.form-radio-btn:hover { border-color: var(--border-strong); color: var(--text); }
.form-radio-btn.active {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
}

/* ============ GESTALT TABS ============ */

.cycle-viz {
  display: flex;
  align-items: center;
  gap: 0;
  margin: 10px 0;
  overflow-x: auto;
}
.cycle-node {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 6px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.12s;
  min-width: 52px;
  flex-shrink: 0;
}
.cycle-node:hover { background: var(--surface-2); }
.cycle-node.active { background: var(--accent-soft); }
.cycle-node-dot {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--border-strong);
  display: grid; place-items: center;
  font-size: 10px; color: var(--text-3);
  transition: all 0.12s;
}
.cycle-node.active .cycle-node-dot { background: var(--accent); color: white; }
.cycle-node-name { font-size: 10px; font-weight: 500; text-align: center; color: var(--text-2); }
.cycle-node.active .cycle-node-name { color: var(--accent); }
.cycle-node-en { font-size: 9px; color: var(--text-4); text-align: center; font-family: var(--mono); }
.cycle-arrow { color: var(--text-4); font-size: 12px; flex-shrink: 0; }

.phenom-field { margin-bottom: 10px; }
.phenom-label { font-size: 11px; color: var(--text-3); font-weight: 500; margin-bottom: 3px; }
.phenom-input {
  width: 100%;
  padding: 6px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  font: inherit;
  font-size: 12.5px;
  outline: none;
  resize: none;
}
.phenom-input:focus { border-color: var(--text-3); }
.contact-level-btns { display: flex; gap: 4px; margin-top: 4px; }
.contact-level-btn {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface-2);
  font-size: 12px; font-weight: 500;
  color: var(--text-3);
  cursor: pointer;
  transition: all 0.12s;
}
.contact-level-btn:hover { border-color: var(--border-strong); color: var(--text); }
.contact-level-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

.situation-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
}
.situation-check {
  width: 16px; height: 16px;
  border-radius: 4px;
  border: 1.5px solid var(--border-strong);
  display: grid; place-items: center;
  cursor: pointer;
  flex-shrink: 0;
  margin-top: 2px;
  transition: all 0.12s;
}
.situation-check.resolved { background: var(--success); border-color: var(--success); color: white; font-size: 10px; }
.situation-text { font-size: 12.5px; flex: 1; line-height: 1.4; }
.situation-text.resolved { text-decoration: line-through; color: var(--text-3); }
.situation-date { font-size: 10.5px; color: var(--text-4); font-family: var(--mono); }

/* ============ INTEGRATIVE TABS ============ */

.approach-bars { margin-top: 6px; }
.approach-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.approach-label { font-size: 11.5px; color: var(--text-2); width: 100px; flex-shrink: 0; }
.approach-bar { flex: 1; height: 8px; background: var(--surface-2); border-radius: 999px; overflow: hidden; }
.approach-bar-fill { height: 100%; border-radius: 999px; transition: width 0.5s ease; }
.approach-count-num { font-family: var(--mono); font-size: 11px; color: var(--text-3); width: 24px; text-align: right; }
.approach-badge {
  display: inline-flex; align-items: center;
  padding: 1px 7px;
  border-radius: 999px;
  font-size: 10.5px; font-weight: 500;
  font-family: var(--mono);
}
.approach-badge.cbt { background: var(--accent-soft); color: var(--accent); }
.approach-badge.gestalt { background: var(--warn-soft); color: var(--warm); }
.approach-badge.psychodynamic { background: #F3E8FF; color: #7C3AED; }
.approach-badge.humanistic { background: var(--success-soft); color: var(--success); }

/* ============ MOBILE BASE (hidden on desktop) ============ */
.mobile-tabbar { display: none; }
.mobile-settings-btn { display: none; }
.inline-feedback-toggle { display: none; font-size: 10.5px; color: var(--text-3); margin-left: auto; padding: 2px 4px; }
.inline-feedback-body { display: flex; flex-direction: column; gap: 6px; }

/* ============ MOBILE ≤768px ============ */
@media (max-width: 768px) {

  html { overflow: hidden; }
  body { min-width: 0 !important; overflow: hidden; }
  #root { height: 100%; overflow: hidden; }

  .app {
    display: flex !important;
    flex-direction: column !important;
    grid-template-columns: none !important;
    min-width: 0 !important;
    height: 100dvh;
    height: 100svh;
    height: -webkit-fill-available;
  }

  /* Panel visibility */
  .sidebar, .main, .right-panel { display: none; }
  .sidebar.mobile-visible { display: flex; flex: 1; min-height: 0; width: 100%; border-right: none; }
  .main.mobile-visible   { display: flex; flex: 1; min-height: 0; width: 100%; }
  .right-panel.mobile-visible { display: flex; flex: 1; min-height: 0; width: 100%; border-left: none; }

  /* Bottom tabbar */
  .mobile-tabbar {
    display: flex;
    flex-shrink: 0;
    height: 58px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom, 0px);
    z-index: 20;
  }
  .mobile-tab-btn {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3px;
    font-size: 10px; font-weight: 500;
    color: var(--text-3);
    letter-spacing: 0.01em;
    padding: 6px 0;
    border-radius: 0;
    transition: color 0.12s;
  }
  .mobile-tab-btn.active { color: var(--accent); }
  .mobile-tab-btn-icon { font-size: 20px; line-height: 1; }

  /* Mobile header */
  .main-header { padding: 10px 12px 10px 16px; min-height: 52px; flex-wrap: nowrap; gap: 8px; }
  .main-header .stage-pill { display: none; }
  .main-header .mode-switcher { display: none; }
  .main-header .timer { display: none; }
  .main-header .end-session-btn { display: none; }
  .main-header .demo-badge { font-size: 10px; padding: 2px 7px; }

  .mobile-settings-btn {
    display: flex; align-items: center; justify-content: center;
    margin-left: auto; flex-shrink: 0;
    width: 38px; height: 38px;
    font-size: 18px;
    border-radius: var(--radius-sm);
    color: var(--text-2);
  }
  .mobile-settings-btn:active { background: var(--surface-2); }

  /* Chat */
  .chat-inner { padding: 0 12px; gap: 14px; }
  .chat-scroll { padding-bottom: 8px; }
  .msg { gap: 8px; }
  .msg-avatar { width: 26px; height: 26px; font-size: 9px; flex: 0 0 26px; border-radius: 6px; }
  .msg-text { font-size: 14px; }

  /* Collapsible inline feedback */
  .inline-feedback-toggle { display: inline-flex; }
  .inline-feedback { cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .inline-feedback.collapsed .inline-feedback-body { display: none; }

  /* Composer */
  .composer { padding: 8px 12px calc(10px + env(safe-area-inset-bottom, 0px)); }
  .composer-inner { max-width: 100%; }
  .composer textarea { font-size: 16px; min-height: 42px; }
  .composer-techniques {
    flex-wrap: nowrap;
    overflow-x: auto; overflow-y: hidden;
    scrollbar-width: none; -webkit-overflow-scrolling: touch;
    gap: 4px; flex: 1; min-width: 0;
  }
  .composer-techniques::-webkit-scrollbar { display: none; }
  .tech-chip { flex-shrink: 0; }
  .send-btn { min-height: 44px; padding: 0 16px; font-size: 13.5px; flex-shrink: 0; }
  .send-btn kbd { display: none; }

  /* Right panel */
  .right-tabs { padding: 8px 8px 0; flex-wrap: nowrap; overflow-x: auto; overflow-y: hidden; scrollbar-width: none; gap: 0; -webkit-overflow-scrolling: touch; }
  .right-tabs::-webkit-scrollbar { display: none; }
  .tab-btn { flex-shrink: 0; padding: 7px 9px; }
  .panel-section { padding: 14px 14px; }
  .panel-h2 { font-size: 16px; }

  /* Sidebar */
  .sidebar { overflow-y: auto; overflow-x: hidden; }
  .sidebar-section { flex-shrink: 0; }
  .sidebar-section[style] { flex: initial !important; overflow-y: visible !important; }
  .case-item-main { padding: 10px 8px; }
  .archive-section { flex-shrink: 0; }
  .sidebar-footer { flex-shrink: 0; margin-top: 0 !important; }

  /* Modals → bottom sheets */
  .modal-overlay { align-items: flex-end; padding: 0; }
  .modal {
    width: 100%; max-width: 100%;
    border-radius: 20px 20px 0 0;
    padding: 8px 20px calc(24px + env(safe-area-inset-bottom, 0px));
    max-height: 92svh; max-height: 92vh;
    overflow-y: auto;
  }
  .modal::before {
    content: '';
    display: block; width: 36px; height: 4px;
    background: var(--border-strong); border-radius: 2px;
    margin: 8px auto 20px;
  }

  /* Mobile settings sheet */
  .mobile-settings-sheet { position: fixed; inset: 0; z-index: 200; }
  .mobile-settings-backdrop { position: absolute; inset: 0; background: rgba(20,20,18,0.45); backdrop-filter: blur(2px); }
  .mobile-settings-panel {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    overflow: hidden;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .mobile-settings-handle { width: 36px; height: 4px; background: var(--border-strong); border-radius: 2px; margin: 12px auto 4px; }
  .mobile-settings-section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); padding: 12px 20px 6px; }
  .mobile-mode-row {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; font-size: 15px;
    width: 100%; text-align: left; border-radius: 0;
    transition: background 0.1s;
  }
  .mobile-mode-row:active { background: var(--surface-2); }
  .mobile-mode-row.active { color: var(--accent); font-weight: 500; }
  .mobile-mode-check { margin-left: auto; font-size: 15px; color: var(--accent); }

  const res = await fetch('https://api.anthropic.com/v1/messages', {

};

window.sanitizeClient = function(c) {

- distortions: ${isGestalt ? 'массив id механизмов прерывания контакта в речи клиента: introjection, projection, retroflection, deflection, confluence, egotism' : 'массив id когнитивных искажений в речи клиента: allornothing, catastrophizing, mindreading, fortunetelling, overgeneralization, mentalfilter, disqualifying, emotionalreasoning, shoulds, labeling, personalization, magnification, blaming, whatif'}${isGestalt ? '\n- contact_phase: где клиент в цикле опыта: "sensation"|"awareness"|"mobilization"|"action"|"contact"|"assimilation"' : ''}

ИСТОРИЯ ДИАЛОГА:
${history.filter(m => m.role !== 'system' && m.role !== 'feedback').slice(-12).map(m =>
  m.role === 'therapist' ? `Терапевт: ${m.text}` : `Клиент (${caseData.name}): ${m.text}`
).join('\n')}

Терапевт: ${therapistMsg}

Верни СТРОГО JSON (без markdown-обёртки):
{
  "client_reply": "...",
  "emotion": "одно-два слова",
  "intensity": 0-100,

  },
  "distortions": ["id1", "id2"]${isGestalt ? ',\n  "contact_phase": "sensation|awareness|mobilization|action|contact|assimilation"' : ''}
}`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',

    },
    body: JSON.stringify({

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);

  const data = await res.json();
  let raw = data.content?.[0]?.text || '';
  let cleaned = raw.trim();
  if (cleaned.startsWith('```')) {
    cleaned = cleaned.replace(/^```(?:json)?\s*/i, '').replace(/\s*```\s*$/, '');

  const i = cleaned.indexOf('{');
  const j = cleaned.lastIndexOf('}');
  if (i >= 0 && j > i) cleaned = cleaned.slice(i, j + 1);

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ============ UTILS ============

function timeNow() {

}

const CYCLE_PHASES = [

  ],
  gestalt: [

function getSuggested(messages, stage) {
  const lastClient = [...messages].reverse().find(m => m.role === 'client');
  const lastTherapist = [...messages].reverse().find(m => m.role === 'therapist');
  const out = [];
  const dist = lastClient?.distortions || [];
  if (dist.length > 0) {
    out.push({ text: 'Проверка доказательств', kind: 'suggested' });
    if (dist.includes('catastrophizing') || dist.includes('whatif')) out.push({ text: 'Декатастрофизация', kind: 'suggested' });
    if (dist.includes('labeling') || dist.includes('shoulds')) out.push({ text: 'Двойной стандарт', kind: 'suggested' });
  }
  if (!lastTherapist) {
    out.push({ text: 'Установка повестки', kind: 'suggested' });
    out.push({ text: 'Проверка настроения', kind: 'suggested' });
  }
  if (messages.length > 4 && messages.length < 12) {
    out.push({ text: 'Сократический вопрос', kind: 'suggested' });
  }
  out.push({ text: 'Эмпатическое отражение', kind: 'normal' });
  out.push({ text: 'Резюме', kind: 'normal' });
  const seen = new Set();
  return out.filter(o => { if (seen.has(o.text)) return false; seen.add(o.text); return true; });
}

function getModeSuggested(messages, stage, mode) {
  if (mode === 'gestalt') return [
    { text: 'Что сейчас чувствуете?', kind: 'suggested' },
    { text: 'Где в теле отзывается?', kind: 'suggested' },
    { text: 'Пустой стул', kind: 'normal' },
    { text: 'Завершить ситуацию', kind: 'normal' }
  ];
  if (mode === 'integrative') return [
    { text: 'Исследовать', kind: 'suggested' },
    { text: 'Валидация', kind: 'suggested' },
    { text: 'Эксперимент', kind: 'normal' },
    { text: 'Мета-комментарий', kind: 'normal' }
  ];
  return getSuggested(messages, stage);
}

function detectStage(messages) {
  const n = messages.filter(m => m.role === 'therapist').length;
  if (n === 0) return 'Открытие';
  if (n <= 2) return 'Установка повестки';
  if (n <= 4) return 'Проверка настроения';
  if (n <= 8) return 'Выявление автоматической мысли';
  if (n <= 14) return 'Сократический диалог';
  if (n <= 17) return 'Резюме и домашнее задание';
  return 'Обратная связь';
}

function NewClientModal({ onClose, onGenerate }) {

  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const diagnoses = ['Депрессия', 'Паническое расстройство', 'Социальная тревога', 'ОКР', 'ПТСР', 'Расстройство личности', 'Прокрастинация/перфекционизм', 'ГТР'];

// ============ MESSAGE COMPONENTS ============

function renderClientText(text, distortions, mode) {
  if (!distortions || distortions.length === 0) return text;
  const lookup = mode === 'gestalt' ? window.GESTALT_MECHANISMS : window.DISTORTIONS;
  const badges = distortions.map((d, i) => {
    const def = lookup.find(x => x.id === d);
    if (!def) return null;
    return <span key={i} className="distortion-mark" title={def.desc}>{def.name}</span>;
  }).filter(Boolean).reduce((acc, el, i) => acc.concat(i === 0 ? [el] : [' · ', el]), []);
  return <span>{text}{' '}{badges}</span>;
}

function InlineFeedback({ fb }) {
  const [collapsed, setCollapsed] = useState(() => typeof window !== 'undefined' && window.innerWidth <= 768);
  const scoreLabel = fb.score === 'good' ? 'Сильный ход' : fb.score === 'ok' ? 'Нормально' : 'Стоит пересмотреть';
  const source = fb.approach ? 'Интегративный' : fb.contact_phase ? 'Перлз / Польстер' : 'Бек / Лихи';
  return (
    <div className={`inline-feedback${collapsed ? ' collapsed' : ''}`} onClick={() => { if (window.innerWidth <= 768) setCollapsed(c => !c); }}>
      <div className="inline-feedback-head">
        <span className={`score-pill ${fb.score}`}>● {scoreLabel}</span>
        <span>· {source}</span>
        <span className="inline-feedback-toggle">{collapsed ? '▾ оценка' : '▴ скрыть'}</span>
      </div>
      <div className="inline-feedback-body">
        <div className="fb-row"><div className="fb-label">Техника</div><div className="fb-val">{fb.technique || '—'}</div></div>
        {fb.approach && <div className="fb-row"><div className="fb-label">Подход</div><div className="fb-val"><span className={`approach-badge ${fb.approach}`}>{fb.approach}</span></div></div>}
        <div className="fb-row"><div className="fb-label">Эмпатия</div><div className="fb-val">{fb.empathy}/100</div></div>
        <div className="fb-row"><div className="fb-label">Точность</div><div className="fb-val">{fb.accuracy}/100</div></div>
        <div className="fb-row"><div className="fb-label">Подсказка</div><div className="fb-val"><em>{fb.hint}</em></div></div>
      </div>
    </div>
  );
}

// ============ COMPOSER ============

function Composer({ onSend, disabled, suggested }) {
  const [value, setValue] = useState('');
  const ref = useRef(null);

  function autoSize() {
    const t = ref.current;
    if (!t) return;
    t.style.height = 'auto';
    t.style.height = Math.min(200, t.scrollHeight) + 'px';
  }

  function handleSend() {
    const v = value.trim();
    if (!v || disabled) return;
    onSend(v);
    setValue('');
    setTimeout(autoSize, 0);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  }

  return (
    <div className="composer">
      <div className="composer-inner">
        <div className="composer-hint">
          <span>Вы — </span>
          <span className="composer-hint-strong">терапевт</span>
          <span>· напишите следующую реплику. Используйте сократические вопросы, эмпатию, не давайте советов.</span>
        </div>
        <div className="composer-box">
          <textarea
            ref={ref}
            value={value}
            onChange={e => { setValue(e.target.value); autoSize(); }}
            onKeyDown={handleKey}
            placeholder='Например: "Понимаю, что это очень сложно. Расскажите, что именно крутилось у вас в голове ночью?"'
            disabled={disabled}
          />
          <div className="composer-toolbar">
            <div className="composer-techniques">
              {suggested.slice(0, 4).map((s, i) => (
                <span key={i} className={`tech-chip ${s.kind === 'suggested' ? 'suggested' : ''}`}>{s.text}</span>
              ))}
            </div>
            <button className="send-btn" onClick={handleSend} disabled={disabled || !value.trim()}>
              {disabled ? 'Клиент думает...' : 'Отправить'}
              <kbd>↵</kbd>
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

      <div className="main-header">

    if (o.quote) grouped[o.id].quotes.push(o.quote);
  });
  const arr = Object.values(grouped).sort((a, b) => b.count - a.count);
  return (
    <>
      <div className="panel-section">
        <div className="panel-h">Когнитивные искажения</div>
        <div className="panel-h2">В речи клиента</div>

                <div key={d.id} className="distortion-card">
                  <div className="distortion-card-head">
                    <span className="distortion-name">{def.name}</span>
                    <span className="distortion-en">{def.en}</span>
                    <span className="distortion-count">×{d.count}</span>

                  <div style={{ fontSize: 12, color: 'var(--text-2)' }}>{def.desc}</div>
                  {d.quotes.length > 0 && <div className="distortion-quote">«{d.quotes[d.quotes.length - 1]}»</div>}

function makeInitialCaseState(c) {
  return {
    messages: c.opening.map(m => ({ ...m, time: m.role === 'system' ? null : timeNow() })),
    distortions: [],
    mechanisms: [],
    smer: [],
    notes: '',
    scales: { ...c.initialScales },
    thinking: false,
    error: null,
    activeSessionN: c.sessions.find(s => s.status === 'active')?.n || 1,
    approachCounts: { cbt: 0, gestalt: 0, psychodynamic: 0, humanistic: 0 },
    recentApproaches: [],
    cyclePhase: null,
    phenomenology: { body: '', voice: '', posture: '', breathing: '', eyeContact: '', contactLevel: 3 },
    unfinishedSituations: []
  };
}

function App() {
  const [hasKey, setHasKey] = useState(() => !!window.getApiKey());
  const [isDemoMode, setIsDemoMode] = useState(false);
  const [therapyMode, setTherapyMode] = useState(() => localStorage.getItem('cbt_therapy_mode') || 'cbt');
  const [mobileTab, setMobileTab] = useState('chat');
  const [showMobileSettings, setShowMobileSettings] = useState(false);
  const [generatedClients, setGeneratedClients] = useState(() => {
    try { return JSON.parse(localStorage.getItem('cbt_generated_clients') || '[]'); } catch { return []; }
  });
  const [archivedClientIds, setArchivedClientIds] = useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem('cbt_archived_ids') || '[]')); } catch { return new Set(); }
  });
  const [showNewClientModal, setShowNewClientModal] = useState(false);
  const [activeCaseId, setActiveCaseId] = useState('maria');

  const allCases = useMemo(() => [...window.CASES, ...generatedClients], [generatedClients]);
  const activeCase = allCases.find(c => c.id === activeCaseId) || allCases[0];

  const [stateByCase, setStateByCase] = useState(() => {
    const obj = {};
    window.CASES.forEach(c => { obj[c.id] = makeInitialCaseState(c); });
    return obj;
  });

  const state = stateByCase[activeCaseId] || makeInitialCaseState(activeCase);

  function patchState(patch) {
    setStateByCase(prev => ({ ...prev, [activeCaseId]: { ...(prev[activeCaseId] || makeInitialCaseState(activeCase)), ...patch } }));
  }

  function setMessages(updater) {
    setStateByCase(prev => {
      const cur = prev[activeCaseId] || makeInitialCaseState(activeCase);
      const next = typeof updater === 'function' ? updater(cur.messages) : updater;
      return { ...prev, [activeCaseId]: { ...cur, messages: next } };
    });
  }

  const stage = useMemo(() => detectStage(state.messages), [state.messages]);
  const suggested = useMemo(() => getModeSuggested(state.messages, stage, therapyMode), [state.messages, stage, therapyMode]);

  function handleModeChange(m) {
    setTherapyMode(m);
    localStorage.setItem('cbt_therapy_mode', m);
  }

  function handleArchive(caseId) {
    const newSet = new Set([...archivedClientIds, caseId]);
    setArchivedClientIds(newSet);
    localStorage.setItem('cbt_archived_ids', JSON.stringify([...newSet]));
    if (caseId === activeCaseId) {
      const next = allCases.find(c => c.id !== caseId && !newSet.has(c.id));
      if (next) setActiveCaseId(next.id);
    }
  }

  function handleRestore(caseId) {
    const newSet = new Set([...archivedClientIds]);
    newSet.delete(caseId);
    setArchivedClientIds(newSet);
    localStorage.setItem('cbt_archived_ids', JSON.stringify([...newSet]));
  }

  function handleNewClientGenerated(c) {
    const updated = [...generatedClients, c];
    setGeneratedClients(updated);
    localStorage.setItem('cbt_generated_clients', JSON.stringify(updated));
    setStateByCase(prev => ({ ...prev, [c.id]: makeInitialCaseState(c) }));
    setActiveCaseId(c.id);
    setShowNewClientModal(false);
  }

  const handleSend = async (text) => {
    if (state.thinking) return;
    const therapistMsg = { role: 'therapist', text, time: timeNow(), feedback: null };
    setMessages(ms => [...ms, therapistMsg]);
    patchState({ thinking: true, error: null });

    try {
      const result = isDemoMode
        ? await new Promise(resolve => setTimeout(() => resolve({
            client_reply: '[ Демо-режим: введите API-ключ для живых ответов клиента ]',
            emotion: 'нейтральное', intensity: 50,
            feedback: {
              technique: 'Демо', approach: 'cbt',
              empathy: Math.floor(Math.random() * 35) + 55,
              accuracy: Math.floor(Math.random() * 35) + 55,
              score: ['good', 'ok', 'warn'][Math.floor(Math.random() * 3)],
              hint: 'Это демо-режим. Введите API-ключ Anthropic, чтобы клиент отвечал по-настоящему и оценки были реальными.'
            },
            distortions: [], contact_phase: null
          }), 800))
        : await window.aiClientTurn({
            caseData: activeCase,
            history: [...state.messages, therapistMsg],
            therapistMsg: text,
            sessionStage: stage,
            mode: therapyMode
          });

      if (!result || !result.client_reply) {
        patchState({ thinking: false, error: 'Не удалось получить ответ. Попробуйте переформулировать.' });
        setTimeout(() => patchState({ error: null }), 3500);
        return;
      }

      const fb = result.feedback || {};
      setStateByCase(prev => {
        const cur = prev[activeCaseId] || makeInitialCaseState(activeCase);
        const ms = [...cur.messages];
        for (let i = ms.length - 1; i >= 0; i--) {
          if (ms[i].role === 'therapist' && !ms[i].feedback) { ms[i] = { ...ms[i], feedback: fb }; break; }
        }
        ms.push({
          role: 'client', text: result.client_reply,
          emotion: result.emotion, intensity: result.intensity,
          distortions: result.distortions || [], time: timeNow()
        });

        let newDistortions = [...cur.distortions];
        let newMechanisms = [...cur.mechanisms];
        let approachCounts = { ...cur.approachCounts };
        let recentApproaches = [...cur.recentApproaches];

        if (therapyMode === 'cbt') {
          (result.distortions || []).forEach(id => newDistortions.push({ id, quote: result.client_reply, msgIndex: ms.length - 1 }));
        } else if (therapyMode === 'gestalt') {
          (result.distortions || []).forEach(id => newMechanisms.push({ id, quote: result.client_reply, msgIndex: ms.length - 1 }));
        } else if (therapyMode === 'integrative') {
          const ap = fb.approach;
          if (ap && ap in approachCounts) {
            approachCounts = { ...approachCounts, [ap]: approachCounts[ap] + 1 };
            recentApproaches = [...recentApproaches.slice(-9), { approach: ap, technique: fb.technique, text: text.slice(0, 80) }];
          }
        }

        return {
          ...prev, [activeCaseId]: {
            ...cur, messages: ms,
            distortions: newDistortions,
            mechanisms: newMechanisms,
            approachCounts, recentApproaches,
            cyclePhase: result.contact_phase || cur.cyclePhase,
            thinking: false
          }
        };
      });
    } catch (e) {
      console.error(e);
      const msg = e.message === 'NO_API_KEY' ? 'API-ключ не задан. Нажмите 🔑 в левой панели.' : 'Ошибка: ' + e.message;
      patchState({ thinking: false, error: msg });
      setTimeout(() => patchState({ error: null }), 4000);
    }
  };

  const handleEndSession = () => {
    const therapistMsgs = state.messages.filter(m => m.role === 'therapist');
    if (therapistMsgs.length === 0) {
      patchState({ error: 'Сессия ещё не началась. Напишите хотя бы одну реплику.' });
      setTimeout(() => patchState({ error: null }), 3000);
      return;
    }
    const withFb = therapistMsgs.filter(m => m.feedback);
    const avgEmpathy = Math.round(withFb.reduce((a, m) => a + (m.feedback?.empathy || 0), 0) / Math.max(1, withFb.length));
    const avgAccuracy = Math.round(withFb.reduce((a, m) => a + (m.feedback?.accuracy || 0), 0) / Math.max(1, withFb.length));
    const techniques = [...new Set(withFb.filter(m => m.feedback?.technique && m.feedback.technique !== '—').map(m => m.feedback.technique))];
    setMessages(ms => [...ms, {
      role: 'review',
      review: { empathy: avgEmpathy, accuracy: avgAccuracy, moves: therapistMsgs.length, techniques, distortions: state.distortions.length },
      time: timeNow()
    }]);
  };

  const handleAddSmer = () => {
    const lastClient = [...state.messages].reverse().find(m => m.role === 'client');
    patchState({ smer: [...state.smer, {
      date: timeNow(), situation: 'Из текущей сессии — заполните',
      thought: lastClient?.text || 'Запишите автоматическую мысль', beliefInThought: 80,
      emotion: lastClient?.emotion || 'тревога', intensity: lastClient?.intensity || 70,
      evidenceFor: '', evidenceAgainst: '', alternative: '', outcome: ''
    }]});
  };

  if (!hasKey && !isDemoMode) return <ApiKeyModal onSave={() => setHasKey(true)} onDemo={() => setIsDemoMode(true)} />;

  return (
    <div className="app">
      {showNewClientModal && (
        <NewClientModal onClose={() => setShowNewClientModal(false)} onGenerate={handleNewClientGenerated} />
      )}
      {showMobileSettings && (
        <MobileSettingsSheet
          mode={therapyMode}
          onModeChange={handleModeChange}
          onEndSession={handleEndSession}
          onClose={() => setShowMobileSettings(false)}
        />
      )}
      <Sidebar
        allCases={allCases}
        activeCaseId={activeCaseId}
        onSelectCase={id => { setActiveCaseId(id); setMobileTab('chat'); }}
        activeSessionN={state.activeSessionN}
        onSelectSession={n => patchState({ activeSessionN: n })}
        onChangeKey={() => { window.setApiKey(''); setHasKey(false); setIsDemoMode(false); }}
        archivedIds={archivedClientIds}
        onArchive={handleArchive}
        onRestore={handleRestore}
        onNewClient={() => setShowNewClientModal(true)}
        mobileVisible={mobileTab === 'clients'}
      />
      <ChatArea
        caseData={activeCase}
        messages={state.messages}
        onSend={handleSend}
        isThinking={state.thinking}
        suggested={suggested}
        stage={stage}
        onEndSession={handleEndSession}
        error={state.error}
        mode={therapyMode}
        onModeChange={handleModeChange}
        isDemo={isDemoMode}
        mobileVisible={mobileTab === 'chat'}
        onOpenMobileSettings={() => setShowMobileSettings(true)}
      />
      <RightPanel
        caseData={activeCase}
        distortionsObserved={state.distortions}
        mechanisms={state.mechanisms}
        smerEntries={state.smer}
        scales={state.scales}
        notes={state.notes}
        onNotesChange={v => patchState({ notes: v })}
        onAddSmer={handleAddSmer}
        mode={therapyMode}
        approachCounts={state.approachCounts}
        recentApproaches={state.recentApproaches}
        cyclePhase={state.cyclePhase}
        onCyclePhaseChange={v => patchState({ cyclePhase: v })}
        phenomenology={state.phenomenology}
        onPhenomenologyChange={v => patchState({ phenomenology: v })}
        unfinishedSituations={state.unfinishedSituations}
        onUnfinishedChange={v => patchState({ unfinishedSituations: v })}
        mobileVisible={mobileTab === 'card'}
      />
      <div className="mobile-tabbar">
        {[
          { id: 'clients', icon: '👥', label: 'Клиенты' },
          { id: 'chat',    icon: '💬', label: 'Сессия' },
          { id: 'card',    icon: '📋', label: 'Карточка' }
        ].map(t => (
          <button key={t.id} className={`mobile-tab-btn${mobileTab === t.id ? ' active' : ''}`} onClick={() => setMobileTab(t.id)}>
            <span className="mobile-tab-btn-icon">{t.icon}</span>
            <span>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
